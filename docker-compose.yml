services:
  search-engine:
    build: .
    container_name: sports-search-engine
    ports:
      - "5000:5000"
    restart: unless-stopped
    environment:
      - FLASK_ENV=production
      - PYTHONUNBUFFERED=1
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:5000/stats')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
